name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - run: uv sync --frozen
      - run: uv run ruff check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - run: uv sync --frozen
      # No real station data (mount/) or sample_configs/-dependent .env exists
      # in CI — tests that need either are self-skipping (requires_mount) or
      # use tmp_path/in-memory fixtures, same as any contributor's machine
      # without the real mount present.
      - run: uv run pytest -q

  docker:
    name: Build image (+ push on main/tags)
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Only push from this repo's own main/tag pushes — not PRs (including
      # PRs from forks, which don't get package-write tokens anyway). PRs
      # still get the build run below (needs: [lint, test] already gates
      # that on tests passing), just without the final push, so a broken
      # Dockerfile is still caught before merge.
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/metadata-action lowercases the image name automatically —
      # GHCR/Docker both reject uppercase, and github.repository preserves
      # whatever casing the GitHub org/repo name actually has.
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # No configuration (sample_configs/, .env, credentials, ...) is ever
      # part of the build context that ends up in the image — see
      # .dockerignore and docs/docker.md. The image is safe to build once
      # here and run against any deployment's own config, supplied entirely
      # via volumes/env vars at container-run time.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
