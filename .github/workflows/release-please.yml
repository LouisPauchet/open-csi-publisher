name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    steps:
      # Runs on every push to main. Most runs just open/update a standing
      # "chore(main): release X.Y.Z" PR (version bump computed from
      # Conventional Commits since the last release, applied to
      # pyproject.toml + CHANGELOG.md) — release_created stays false and
      # nothing downstream fires. Merging THAT PR is what actually creates
      # the release: this step then reports release_created=true, and the
      # docker-publish job below builds and pushes the image.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  docker-publish:
    name: Build & push release image
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags come directly from release-please's own computed version, not
      # re-parsed from a git ref/tag string — pyproject.toml's `version` and
      # the image tag are always the exact same number by construction,
      # since release-please is what wrote both. docker/metadata-action
      # lowercases the image name automatically (GHCR rejects uppercase).
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}.${{ needs.release-please.outputs.patch }}
            type=raw,value=${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}
            type=raw,value=${{ needs.release-please.outputs.major }}

      # No configuration is ever part of the build context — see
      # .dockerignore and docs/docker.md.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
