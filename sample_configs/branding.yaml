# Visual identity for this deployment of the portal — see src/open_csi_publisher/
# branding.py for the full field list and docs/branding.md for how to point a
# non-UNIS deployment at a different file (settings.BRANDING_FILE).
#
# Colors and the logo URL are taken from UNIS's own public site (www.unis.no),
# specifically its wp-content/themes/unis/assets/css/vars.css design tokens.
site_name: "Environmental Data Portal"
logo_url: "https://www.unis.no/wp-content/uploads/2022/05/unis-logo-liggende.svg"
color_primary: "#006199"
color_secondary: "#1D201F"
color_background: "#FEFFF8"
color_header_background: "#F3F6EA"
color_link: "#004083"
color_link_hover: "#6F4F2B"
color_border: "#B6C4C7"
font_family: '"IBM Plex Sans", system-ui, -apple-system, "Segoe UI", sans-serif'
radius: "8px"
